<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e4d14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>BWR — La carte qui simplifie ta vie</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <header class="header">
    <div class="header-left">
      <a href="index.html" class="logo" style="text-decoration:none">BWR</a>
      <span class="tagline">La carte qui simplifie ta vie</span>
    </div>
    <div class="header-right">
      <button class="btn-icon" id="toggleFilters" title="Filtres">&#9776; Filtres</button>
      <a href="routes.html" class="btn-icon" id="btnPlanRoute" style="display:none; text-decoration:none">🗺 Planifier un trajet</a>
      <a href="plans.html" class="btn-icon" style="text-decoration:none">⭐ Plans</a>
      <div class="user-menu" id="userMenu">
        <!-- filled by map.js -->
      </div>
    </div>
  </header>

  <div class="filter-panel hidden" id="filterPanel">
    <h3>Filtrer les chemins</h3>
    <div class="filter-group">
      <label class="filter-label">
        <input type="checkbox" class="filter-check" value="easy" checked />
        <span class="dot easy"></span> Facile
      </label>
      <label class="filter-label">
        <input type="checkbox" class="filter-check" value="medium" checked />
        <span class="dot medium"></span> Moyen
      </label>
      <label class="filter-label">
        <input type="checkbox" class="filter-check" value="hard" checked />
        <span class="dot hard"></span> Difficile
      </label>
      <label class="filter-label">
        <input type="checkbox" class="filter-check" value="not_passable" checked />
        <span class="dot not_passable"></span> Impraticable
      </label>
    </div>
    <hr />
    <h3>Couche de carte</h3>
    <div class="filter-group">
      <label class="filter-label">
        <input type="radio" name="tileLayer" value="ign" checked /> IGN topographique
      </label>
      <label class="filter-label">
        <input type="radio" name="tileLayer" value="satellite" /> Satellite IGN
      </label>
    </div>
  </div>

  <div id="map">
    <!-- Floating search bar -->
    <div class="map-search-wrap" id="mapSearchWrap">
      <div class="map-search-box">
        <span class="map-search-icon">🔍</span>
        <input type="text" id="mapSearchInput" class="map-search-input"
          placeholder="Chercher un lieu…" autocomplete="off" />
        <button class="map-search-clear hidden" id="mapSearchClear">✕</button>
      </div>
      <div class="map-search-results hidden" id="mapSearchResults"></div>
    </div>
    <!-- Locate me button -->
    <button class="map-locate-btn" id="btnLocate" title="Ma position">📍</button>
  </div>

  <div class="legend">
    <div class="legend-title">Légende</div>
    <div class="legend-item"><span class="dot easy"></span> Facile</div>
    <div class="legend-item"><span class="dot medium"></span> Moyen</div>
    <div class="legend-item"><span class="dot hard"></span> Difficile</div>
    <div class="legend-item"><span class="dot not_passable"></span> Impraticable</div>
  </div>

  <div id="pathCount" class="path-count"></div>

  <a href="mailto:ciril8596@gmail.com" class="contact-chip">✉ Contact</a>

  <!-- Report button -->
  <button class="report-fab" id="btnReport" title="Signaler un problème">⚠️</button>

  <!-- Report modal -->
  <div class="report-modal hidden" id="reportModal">
    <div class="report-modal-inner">
      <h3>Signaler un problème</h3>
      <p class="report-hint">Clique ensuite sur la carte pour indiquer l'endroit.</p>
      <div class="report-types" id="reportTypes">
        <button class="rtype-btn active" data-type="fallen_tree">🌲 Arbre tombé</button>
        <button class="rtype-btn" data-type="flooded">💧 Chemin inondé</button>
        <button class="rtype-btn" data-type="closed">🚫 Chemin fermé</button>
        <button class="rtype-btn" data-type="danger">⚠️ Danger</button>
        <button class="rtype-btn" data-type="other">📝 Autre</button>
      </div>
      <textarea id="reportNote" class="input-field" placeholder="Détails (optionnel)..." rows="2"></textarea>
      <div class="report-modal-actions">
        <button class="btn-primary" id="btnReportSubmit">📍 Cliquer sur la carte</button>
        <button class="btn-secondary" id="btnReportCancel">Annuler</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/carrefours.js"></script>
  <script src="js/map.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/bwr-project/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
