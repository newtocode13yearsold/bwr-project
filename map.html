<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e4d14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>BWR — La carte qui simplifie ta vie</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="css/upsell.css" />
</head>
<body>

  <header class="header">
    <div class="header-left">
      <a href="index.html" class="logo" style="text-decoration:none">BWR</a>
      <span class="tagline">La carte qui simplifie ta vie</span>
    </div>
    <div class="header-right">
      <button class="btn-icon" id="toggleFilters" title="Filtres"><span class="btn-emoji">&#9776;</span><span class="btn-label">Filtres</span></button>
      <a href="routes.html" class="btn-icon" id="btnPlanRoute" title="Planifier un trajet" style="display:none; text-decoration:none"><span class="btn-emoji">🗺</span><span class="btn-label">Planifier</span></a>
      <a href="plans.html" class="btn-icon" title="Plans" style="text-decoration:none"><span class="btn-emoji">⭐</span><span class="btn-label">Plans</span></a>
      <div class="user-menu" id="userMenu">
        <!-- filled by map.js -->
      </div>
    </div>
  </header>

  <div class="filter-panel hidden" id="filterPanel">
    <h3>Filtrer les chemins</h3>
    <div class="filter-group">
      <label class="filter-label">
        <input type="checkbox" class="filter-check" value="easy" checked />
        <span class="dot easy"></span> Facile
      </label>
      <label class="filter-label">
        <input type="checkbox" class="filter-check" value="medium" checked />
        <span class="dot medium"></span> Moyen
      </label>
      <label class="filter-label">
        <input type="checkbox" class="filter-check" value="hard" checked />
        <span class="dot hard"></span> Difficile
      </label>
      <label class="filter-label">
        <input type="checkbox" class="filter-check" value="not_passable" checked />
        <span class="dot not_passable"></span> Impraticable
      </label>
      <label class="filter-label">
        <input type="checkbox" class="filter-check" value="no_bike" checked />
        <span class="dot no_bike"></span> Vélo interdit
      </label>
    </div>
    <hr />
    <h3>Couche de carte</h3>
    <div class="filter-group">
      <label class="filter-label">
        <input type="radio" name="tileLayer" value="ign" checked /> IGN topographique
      </label>
      <label class="filter-label">
        <input type="radio" name="tileLayer" value="satellite" /> Satellite IGN
      </label>
    </div>
  </div>

  <div id="map">
    <!-- Floating search bar -->
    <div class="map-search-wrap" id="mapSearchWrap">
      <div class="map-search-box">
        <span class="map-search-icon">🔍</span>
        <input type="text" id="mapSearchInput" class="map-search-input"
          placeholder="Chercher un lieu…" autocomplete="off" />
        <button class="map-search-clear hidden" id="mapSearchClear">✕</button>
      </div>
      <div class="map-search-results hidden" id="mapSearchResults"></div>
    </div>
    <!-- Locate me button -->
    <button class="map-locate-btn" id="btnLocate" title="Ma position">📍</button>
  </div>

  <div class="legend">
    <div class="legend-title">Légende</div>
    <div class="legend-item"><span class="dot easy"></span> Facile</div>
    <div class="legend-item"><span class="dot medium"></span> Moyen</div>
    <div class="legend-item"><span class="dot hard"></span> Difficile</div>
    <div class="legend-item"><span class="dot not_passable"></span> Impraticable</div>
    <div class="legend-item"><span class="dot no_bike"></span> Vélo interdit</div>
  </div>


  <button class="contact-chip" id="btnOpenContact">✉ Contact</button>

  <!-- Contact modal -->
  <div class="modal-overlay hidden" id="contactModal">
    <div class="modal-card contact-modal-card">
      <button class="modal-close-x" id="btnCloseContact">✕</button>
      <h3>Contactez-nous</h3>
      <p style="font-size:0.85rem;color:#6b7280;margin-bottom:12px">Une question, suggestion ou erreur signalée ? Écrivez-nous :</p>
      <form id="mapContactForm" style="display:flex;flex-direction:column;gap:10px">
        <input type="text"  id="mcName"  class="input-field" placeholder="Votre nom" required>
        <input type="email" id="mcEmail" class="input-field" placeholder="Votre email" required>
        <textarea id="mcMessage" class="input-field" placeholder="Votre message…" rows="4" required></textarea>
        <button type="submit" class="btn-primary" id="mcSubmit">Envoyer</button>
        <p id="mcStatus" style="text-align:center;font-size:0.85rem;font-weight:600;min-height:18px"></p>
      </form>
    </div>
  </div>

  <button class="report-fab" id="btnReport">⚠️ Signaler</button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/features.js"></script>
  <script src="js/carrefours.js"></script>
  <script src="js/map.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/bwr-project/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
