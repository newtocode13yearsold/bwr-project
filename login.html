<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BWR — Connexion | Carte forêt de Compiègne</title>
  <meta name="description" content="Connectez-vous à BWR pour accéder à la carte interactive des sentiers de la forêt de Compiègne." />
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#1e4d14" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-page">

  <div class="login-bg">
    <div class="login-card">

      <a href="index.html" class="back-link">← Retour à l'accueil</a>

      <div class="login-logo">BWR</div>
      <p class="login-sub">La carte qui simplifie ta vie</p>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" id="tabLogin">Se connecter</button>
        <button class="tab" id="tabSignup">S'inscrire</button>
      </div>

      <!-- Login form -->
      <form id="loginForm" class="auth-form">
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" class="input-field" placeholder="ton@email.com" required />
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input type="password" id="loginPassword" class="input-field" placeholder="••••••••" required />
        </div>
        <div id="loginError" class="form-error hidden"></div>
        <button type="submit" class="btn-primary">Se connecter</button>
      </form>

      <!-- Signup form -->
      <form id="signupForm" class="auth-form hidden">
        <div class="field">
          <label>Prénom et nom</label>
          <input type="text" id="signupName" class="input-field" placeholder="Thomas Legros" required />
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="signupEmail" class="input-field" placeholder="ton@email.com" required />
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input type="password" id="signupPassword" class="input-field" placeholder="6 caractères minimum" required />
        </div>
        <div id="signupError" class="form-error hidden"></div>
        <div id="signupSuccess" class="form-success hidden"></div>
        <button type="submit" class="btn-primary">Créer mon compte</button>
      </form>

    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
