<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1e4d14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <title>BWR — Admin</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <div id="adminPanel">

    <header class="header">
      <div class="header-left">
        <span class="logo">BWR</span>
        <span class="tagline admin-tag">Admin</span>
      </div>
      <div class="header-right">
        <button class="btn-icon" id="btnSelectPath" title="Sélectionner un chemin"><span class="btn-emoji">🗺</span><span class="btn-label">Sélectionner</span></button>
        <button class="btn-icon" id="btnDrawPath" title="Dessiner"><span class="btn-emoji">✏</span><span class="btn-label">Dessiner</span></button>
        <button class="btn-icon" id="btnMembers" title="Gérer les membres"><span class="btn-emoji">👥</span><span class="btn-label">Membres</span></button>
        <button class="btn-icon" id="btnOfflineAdmin" title="Télécharger la carte hors-ligne"><span class="btn-emoji">💾</span><span class="btn-label">Carte</span></button>
        <button class="btn-icon" id="btnSplitCancel" title="Annuler le découpage" style="display:none;background:rgba(239,68,68,0.4)"><span class="btn-emoji">✕</span><span class="btn-label">Annuler</span></button>
        <a href="news.html" class="btn-icon" title="Actualités" style="text-decoration:none"><span class="btn-emoji">📰</span><span class="btn-label">Actus</span></a>
        <div class="user-menu" id="userMenu"></div>
      </div>
    </header>

    <!-- Offline sync banner -->
    <div id="syncBanner" style="display:none;background:#92400e;color:#fef3c7;padding:8px 16px;font-size:0.82rem;align-items:center;gap:10px;justify-content:center;">
      <span class="sync-icon">↻</span>
      <span class="sync-count"></span>
      <button onclick="replayOfflineQueue();replayOfflineNewPaths();" style="background:#fef3c7;color:#92400e;border:none;border-radius:6px;padding:3px 10px;font-size:0.8rem;cursor:pointer;font-weight:600;">Synchroniser maintenant</button>
    </div>

    <!-- New path form -->
    <div id="pathForm" class="path-form hidden">
      <h3>Nouveau chemin</h3>
      <label>Nom du chemin
        <input type="text" id="pathName" class="input-field" placeholder="Ex: Chemin du moulin" />
      </label>
      <label>Type de chemin
        <select id="pathType" class="input-field">
          <option value="foot">🌲 Chemin forestier</option>
          <option value="bike">🚴 Piste cyclable</option>
          <option value="field">🌾 Chemin de champs</option>
        </select>
      </label>
      <label>État
        <select id="pathStatus" class="input-field">
          <option value="easy">Facile (vert)</option>
          <option value="medium">Moyen (orange)</option>
          <option value="hard">Difficile (rouge)</option>
          <option value="not_passable">Impraticable (gris)</option>
          <option value="no_bike">Vélo interdit (violet)</option>
        </select>
      </label>
      <label>Conditions du chemin</label>
      <div class="condition-tags" id="newConditions">
        <button type="button" class="cond-tag" data-cond="dry">✅ Sec</button>
        <button type="button" class="cond-tag" data-cond="muddy">🟤 Boueux</button>
        <button type="button" class="cond-tag" data-cond="rutted">🛞 Ornières</button>
        <button type="button" class="cond-tag" data-cond="fallen">❌ Arbres tombés</button>
        <button type="button" class="cond-tag" data-cond="mtb">🚴 Idéal MTB</button>
        <button type="button" class="cond-tag" data-cond="running">🏃 Running</button>
        <button type="button" class="cond-tag" data-cond="family">👨‍👩‍👧 Famille</button>
      </div>
      <label>Notes (optionnel)
        <textarea id="pathNotes" class="input-field" placeholder="Surface, obstacles, saison..." rows="3"></textarea>
      </label>
      <div class="form-buttons">
        <button class="btn-primary" id="btnSavePath">Enregistrer</button>
        <button class="btn-secondary" id="btnCancelPath">Annuler</button>
      </div>
    </div>

    <!-- Edit form -->
    <div id="editForm" class="path-form hidden">
      <h3>Modifier le chemin</h3>
      <label>Nom du chemin
        <input type="text" id="editName" class="input-field" />
      </label>
      <label>Type de chemin
        <select id="editType" class="input-field">
          <option value="foot">🌲 Chemin forestier</option>
          <option value="bike">🚴 Piste cyclable</option>
          <option value="field">🌾 Chemin de champs</option>
        </select>
      </label>
      <label>État
        <select id="editStatus" class="input-field">
          <option value="easy">Facile (vert)</option>
          <option value="medium">Moyen (orange)</option>
          <option value="hard">Difficile (rouge)</option>
          <option value="not_passable">Impraticable (gris)</option>
          <option value="no_bike">Vélo interdit (violet)</option>
        </select>
      </label>
      <label>Conditions du chemin</label>
      <div class="condition-tags" id="editConditions">
        <button type="button" class="cond-tag" data-cond="dry">✅ Sec</button>
        <button type="button" class="cond-tag" data-cond="muddy">🟤 Boueux</button>
        <button type="button" class="cond-tag" data-cond="rutted">🛞 Ornières</button>
        <button type="button" class="cond-tag" data-cond="fallen">❌ Arbres tombés</button>
        <button type="button" class="cond-tag" data-cond="mtb">🚴 Idéal MTB</button>
        <button type="button" class="cond-tag" data-cond="running">🏃 Running</button>
        <button type="button" class="cond-tag" data-cond="family">👨‍👩‍👧 Famille</button>
      </div>
      <label>Notes
        <textarea id="editNotes" class="input-field" rows="3"></textarea>
      </label>
      <div class="form-buttons">
        <button class="btn-primary" id="btnUpdatePath">Mettre à jour</button>
        <button class="btn-danger" id="btnDeletePath">Supprimer</button>
        <button class="btn-secondary" id="btnCancelEdit">Annuler</button>
      </div>
    </div>

    <!-- Members management panel -->
    <div id="membersPanel" class="path-form hidden" style="max-height:80vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 style="margin:0">👥 Gestion des membres</h3>
        <button class="btn-secondary" id="btnCloseMembersPanel" style="width:auto;padding:6px 14px">✕</button>
      </div>
      <div id="membersList" style="display:flex;flex-direction:column;gap:10px"></div>
    </div>

    <!-- Member plan modal -->
    <div class="modal-overlay hidden" id="memberPlanModal" role="dialog" aria-modal="true" aria-labelledby="memberPlanTitle">
      <div class="modal-box" style="min-width:300px">
        <h3 class="modal-title" id="memberPlanTitle">Modifier le plan</h3>
        <input type="hidden" id="memberPlanUserId">
        <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
          <label style="font-size:0.88rem;font-weight:600;color:#374151">Plan
            <select id="memberPlanSelect" class="input-field" style="margin-top:4px">
              <option value="free">🌿 Gratuit</option>
              <option value="silver">🥈 Argent</option>
              <option value="gold">🥇 Or</option>
            </select>
          </label>
          <label style="font-size:0.88rem;font-weight:600;color:#374151">Expiration (optionnel)
            <input type="date" id="memberPlanExpiry" class="input-field" style="margin-top:4px">
          </label>
          <label style="font-size:0.88rem;font-weight:600;color:#374151">Plan de base (après expiration)
            <select id="memberPlanBase" class="input-field" style="margin-top:4px">
              <option value="free">🌿 Gratuit</option>
              <option value="silver">🥈 Argent</option>
              <option value="gold">🥇 Or</option>
            </select>
          </label>
        </div>
        <div class="modal-actions">
          <button class="btn-modal-cancel" id="btnCancelMemberPlan">Annuler</button>
          <button class="btn-modal-confirm" id="btnSaveMemberPlan">Enregistrer</button>
        </div>
      </div>
    </div>

    <div id="map"></div>

    <div class="legend">
      <div class="legend-title">Légende</div>
      <div class="legend-item"><span class="dot easy"></span> Facile</div>
      <div class="legend-item"><span class="dot medium"></span> Moyen</div>
      <div class="legend-item"><span class="dot hard"></span> Difficile</div>
      <div class="legend-item"><span class="dot not_passable"></span> Impraticable</div>
      <div class="legend-item"><span class="dot no_bike"></span> Vélo interdit</div>
    </div>

    <div id="adminStatus" class="admin-status"></div>

  </div>

  <div id="offline-pill">📶 Hors-ligne</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/carrefours.js"></script>
  <script src="js/admin.js"></script>
  <script>
    (function() {
      var pill = document.getElementById('offline-pill');
      function updatePill() { pill.classList.toggle('visible', !navigator.onLine); }
      window.addEventListener('online', updatePill);
      window.addEventListener('offline', updatePill);
      updatePill();
    })();
  </script>
</body>
</html>
