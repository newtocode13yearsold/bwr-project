<!DOCTYPE html>

<head>

  <meta name="description" content="Historique des corrections et améliorations de l'application BWR." />
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#1e4d14" />
  <link rel="manifest" href="manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body class="changelog-body">

  <!-- ── Nav ── -->
  <nav class="cl-nav">
    <div class="cl-nav-inner">
      <a href="/" class="cl-logo">BWR</a>
      <a href="map" class="cl-back">← Retour à la carte</a>
    </div>
  </nav>

  <!-- ── Header ── -->
  <header class="cl-header">
    <span class="cl-eyebrow">Historique</span>
    <h1 class="cl-title display">Changelog</h1>
    <p class="cl-subtitle">Corrections de bugs et améliorations, au fil des versions.</p>
  </header>

  <!-- ── Timeline ── -->
  <main class="cl-timeline" id="timeline">

    <!-- ─ Example release block — duplicate this pattern for each version ─
    <section class="cl-release">
      <div class="cl-release-header">
        <div class="cl-dot">🌿</div>
        <div class="cl-release-meta">
          <span class="cl-version">v1.x.x</span>
          <span class="cl-date">27 mai 2026</span>
        </div>
      </div>
      <div class="cl-entries">
        <div class="cl-entry">
          <span class="cl-tag fix">fix</span>
          <p class="cl-entry-text"><strong>Titre du bug</strong> — Description courte de ce qui était cassé et comment c'est réparé.</p>
        </div>
        <div class="cl-entry">
          <span class="cl-tag feat">feat</span>
          <p class="cl-entry-text"><strong>Nouvelle fonctionnalité</strong> — Ce qui a été ajouté et pourquoi.</p>
        </div>
      </div>
    </section>
    ─────────────────────────────────────────────────────────────────────────── -->

    <div class="cl-empty" id="emptyState">
      Aucune entrée pour l'instant — les corrections arrivent bientôt.
    </div>

  </main>

</body>
