<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BWR — Réinitialiser le mot de passe</title>
  <!-- Open Graph / réseaux sociaux -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://bwrmaps.com/reset" />
  <meta property="og:site_name" content="BWR" />
  <meta property="og:title" content="Réinitialiser le mot de passe — BWR" />
  <meta property="og:description" content="Réinitialisez votre mot de passe BWR." />
  <meta property="og:locale" content="fr_FR" />

  <meta property="og:image" content="https://bwrmaps.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:alt" content="BWR — la carte des forêts de l'Oise, à pied ou à vélo" />
  <meta name="twitter:image" content="https://bwrmaps.com/og-image.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Réinitialiser le mot de passe — BWR" />
  <meta name="twitter:description" content="Réinitialisez votre mot de passe BWR." />

  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#1e4d14" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
  <script src="js/theme.js"></script>
</head>
<body class="login-page">
  <div class="login-bg">
    <div class="login-card">
      <div class="login-logo">BWR</div>
      <p class="login-sub">La carte qui simplifie ta vie</p>

      <h2 style="text-align:center;margin-top:1.5rem;font-size:1.1rem;">Nouveau mot de passe</h2>

      <!-- Reset form -->
      <form id="resetForm" class="auth-form" style="margin-top:1rem;">
        <div class="field">
          <label>Nouveau mot de passe</label>
          <div class="pw-wrap">
            <input type="password" id="resetPassword" class="input-field" placeholder="8 caractères minimum" minlength="8" required />
            <button type="button" class="pw-eye" aria-label="Afficher le mot de passe" data-target="resetPassword">
              <svg class="eye-icon eye-show" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-icon eye-hide" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div id="resetError" class="form-error hidden"></div>
        <button type="submit" class="btn-primary">Réinitialiser</button>
      </form>

      <!-- Success / status panel -->
      <div id="resetStatus" class="hidden" style="text-align:center;margin-top:1rem;"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/reset.js"></script>
</body>
</html>
