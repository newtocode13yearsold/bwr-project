<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BWR — Connexion | Carte forêt de Compiègne</title>
  <meta name="description" content="Connectez-vous à BWR pour accéder à la carte interactive des sentiers de la forêt de Compiègne." />
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#1e4d14" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
  <script src="js/theme.js"></script>
</head>
<body class="login-page">

  <div class="login-bg">
    <div class="login-card">

      <a href="/" class="back-link">← Retour à l'accueil</a>

      <div class="login-logo">BWR</div>
      <p class="login-sub">La carte qui simplifie ta vie</p>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" id="tabLogin">Se connecter</button>
        <button class="tab" id="tabSignup">S'inscrire</button>
      </div>

      <!-- Login form -->
      <form id="loginForm" class="auth-form">
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" class="input-field" placeholder="ton@email.com" required />
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <div class="pw-wrap">
            <input type="password" id="loginPassword" class="input-field" placeholder="••••••••" required />
            <button type="button" class="pw-eye" aria-label="Afficher le mot de passe" data-target="loginPassword">
              <svg class="eye-icon eye-show" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-icon eye-hide" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div id="loginError" class="form-error hidden"></div>
        <button type="submit" class="btn-primary">Se connecter</button>
        <p style="margin-top:.75rem;text-align:center;font-size:13px;color:#6b7280">
          <a href="#" id="showResendLink" style="color:#2d6b1f;text-decoration:underline">Je n'ai pas reçu l'email de vérification</a>
        </p>
      </form>

      <!-- Resend verification panel -->
      <div id="resendPanel" class="hidden" style="margin-top:-.5rem">
        <div class="field">
          <label>Email du compte en attente</label>
          <input type="email" id="resendEmail" class="input-field" placeholder="ton@email.com" />
        </div>
        <div id="resendMsg" class="form-error hidden"></div>
        <button type="button" id="resendBtn" class="btn-secondary" style="width:100%">Renvoyer l'email de vérification</button>
        <p style="margin-top:.5rem;text-align:center;font-size:13px;color:#6b7280">
          <a href="#" id="hideResendLink" style="color:#2d6b1f;text-decoration:underline">Retour à la connexion</a>
        </p>
      </div>

      <!-- Signup form -->
      <form id="signupForm" class="auth-form hidden">
        <div class="field">
          <label>Prénom et nom</label>
          <input type="text" id="signupName" class="input-field" placeholder="Thomas Legros" required />
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="signupEmail" class="input-field" placeholder="ton@email.com" required />
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <div class="pw-wrap">
            <input type="password" id="signupPassword" class="input-field" placeholder="8 caractères minimum" minlength="8" required />
            <button type="button" class="pw-eye" aria-label="Afficher le mot de passe" data-target="signupPassword">
              <svg class="eye-icon eye-show" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-icon eye-hide" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div class="field" style="margin-top:4px">
          <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer">
            <input type="checkbox" id="signupConsent" required style="margin-top:3px;flex-shrink:0;width:16px;height:16px;accent-color:#2d6b1f;cursor:pointer" />
            <span style="font-size:13px;color:#6b7280;line-height:1.5">
              J'ai lu et j'accepte les <a href="legal" target="_blank" style="color:#2d6b1f">CGU et la politique de confidentialité</a>
            </span>
          </label>
        </div>
        <div id="signupError" class="form-error hidden"></div>
        <div id="signupSuccess" class="form-success hidden"></div>
        <button type="submit" class="btn-primary">Créer mon compte</button>
      </form>

    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
